name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync main into staging
        if: success() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --unshallow origin || true
          git fetch origin staging || exit 0
          git checkout staging
          git merge origin/main --no-edit || {
            echo "::warning::Merge conflict syncing main into staging — manual resolution needed"
            git merge --abort || true
            exit 0
          }
          git push origin staging

      - name: Trigger Dokploy deploy
        if: success()
        run: |
          curl -sf -X POST "${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" || echo "Deploy webhook failed"
