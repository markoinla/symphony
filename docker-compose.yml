# Host prerequisites: claude or codex CLI installed and authenticated.
#
# Set HOST_HOME in your .env to your home directory path, e.g.:
#   HOST_HOME=/home/marko
#
# The container runs as root with IS_SANDBOX=1 so Claude CLI accepts
# --dangerously-skip-permissions. Host home is mounted for auth/git/ssh
# config, with the DB directory writable.

services:
  symphony:
    image: ghcr.io/markoinla/symphony:main
    pull_policy: always
    ports:
      - "4000:4000"
    volumes:
      # Mount host home directory (auth, git, ssh, claude config)
      - ${HOST_HOME}:${HOST_HOME}

      # Separate DB so container doesn't share with host Symphony
      - symphony-data:${HOST_HOME}/.symphony

      # Writable workspace directory
      - /tmp/symphony_workspaces:/tmp/symphony_workspaces
    environment:
      - HOME=${HOST_HOME}
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${HOST_HOME}/.local/bin
    env_file:
      - .env
    working_dir: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  symphony-data:

