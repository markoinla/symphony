# Host prerequisites: claude or codex CLI installed and authenticated.
#
# The container runs as the host user (not root) so all auth, git config,
# and SSH keys work automatically via a single home directory mount.

services:
  symphony:
    image: ghcr.io/markoinla/symphony:main
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "4000:4000"
    volumes:
      # Mount host home directory (read-only for auth, git, ssh)
      - ${HOME}:${HOME}:ro

      # Writable overlay for Symphony DB (persists across redeploys)
      - symphony-data:${HOME}/.symphony

      # Writable workspace directory
      - /tmp/symphony_workspaces:/tmp/symphony_workspaces

      # Log directory
      - ./log:/app/log
    environment:
      - HOME=${HOME}
    env_file:
      - .env
    working_dir: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  symphony-data:
